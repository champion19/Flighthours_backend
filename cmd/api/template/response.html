<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{{.Title}}</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0A192F; 
      color: #ffffff;
      padding: 2rem;
    }
    .card {
      background: #ffffff;
      color: #0A192F;
      padding: 2rem;
      max-width: 600px;
      margin: auto;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      border-left: 5px solid #007BFF;
    }
    h1 {
      color: #007BFF;
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background-color: #007BFF;
      color: white;
      border: none;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #0056b3;
    }
    a {
      color: #007BFF;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>{{.Title}}</h1>
    <div>{{.Content}}</div>
    <div>{{.Button}}</div>
  </div>
</body>
</html>
